<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda APS</title>
    <style>
        body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e9f0f5; margin: 0; }
        .card { background: white; border-radius: 32px; padding: 40px; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        button { background: #4285f4; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-size: 1rem; cursor: pointer; margin-top: 20px; width: 100%; }
        button:hover { background: #3367d6; }
        .status { margin-top: 20px; padding: 10px; border-radius: 12px; font-size: 0.8rem; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="card">
    <h1>📅 AGENDA DE FÉRIAS DA APS</h1>
    <p>Faça login para continuar</p>
    <button id="loginBtn">🔐 Entrar com Google</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBLIWcjvXouacuZ-WGJncY-ixbqqbRQMSM",
        authDomain: "agenda-calendario-aps.firebaseapp.com",
        projectId: "agenda-calendario-aps",
        storageBucket: "agenda-calendario-aps.firebasestorage.app",
        messagingSenderId: "174124394971",
        appId: "1:174124394971:web:14d13869040f1450b55ffe"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    const statusDiv = document.getElementById('status');
    
    document.getElementById('loginBtn').onclick = async () => {
        statusDiv.innerHTML = "🔄 Aguardando autorização...";
        statusDiv.className = "status";
        
        try {
            const result = await signInWithPopup(auth, provider);
            statusDiv.innerHTML = `✅ Login realizado com sucesso!<br>Bem-vindo, ${result.user.displayName || result.user.email}!<br><br>🔜 O calendário completo será carregado em breve.`;
            statusDiv.className = "status success";
        } catch (error) {
            console.error("Erro:", error);
            let mensagem = "❌ Erro ao fazer login.";
            if (error.code === "auth/unauthorized-domain") {
                mensagem += " Domínio não autorizado no Firebase.";
            } else if (error.code === "auth/popup-closed-by-user") {
                mensagem += " Popup fechado antes de completar o login.";
            } else {
                mensagem += ` ${error.message}`;
            }
            statusDiv.innerHTML = mensagem;
            statusDiv.className = "status error";
        }
    };
</script>
</body>
</html>
