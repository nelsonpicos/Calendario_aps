<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AGENDA DE FÉRIAS DA APS - Calendário</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #e9f0f5; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: white; border-radius: 48px; padding: 48px; text-align: center; max-width: 450px; width: 90%; }
        .login-card h1 { color: #1b5e7a; margin-bottom: 20px; }
        .google-btn { background: #4285f4; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin-top: 20px; }
        .google-btn:hover { background: #3367d6; }
        .google-btn:disabled { background: #a8c7fa; cursor: not-allowed; }
        .loading { text-align: center; padding: 40px; color: #1b5e7a; font-weight: bold; font-size: 1.2rem; }
        .app-container { max-width: 1400px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .page-main-title { background: linear-gradient(135deg, #1b5e7a 0%, #2c8cb0 100%); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.2); padding: 8px 18px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1b5e7a; }
        .logout-btn { background: white; color: #1b5e7a; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .main-calendar { padding: 24px 28px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e2edf2; }
        .view-buttons, .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .view-btn, .action-btn { background: white; color: #1e4a6e; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .view-btn.active, .action-btn.active-toggle { background: #2c7da0; color: white; border-color: #2c7da0; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #6c757d; color: white; border-radius: 16px; padding: 12px 0; margin-bottom: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { background: white; border: 2px solid #dee2e6; border-radius: 12px; min-height: 100px; padding: 8px 6px; cursor: pointer; transition: 0.1s; }
        .calendar-day:hover { background: #f8fafc; transform: scale(0.98); }
        .calendar-day.other-month { background: #fafcff; color: #94a3b8; }
        .day-number { font-weight: bold; font-size: 1rem; margin-bottom: 8px; text-align: right; }
        .event-list { display: flex; flex-direction: column; gap: 4px; font-size: 0.7rem; }
        .event-item { border-radius: 14px; padding: 2px 6px; background: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-event { color: white; border-radius: 20px; font-weight: 500; }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .month-nav button { background: #6c757d; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; border: none; }
        .current-month { font-size: 1.5rem; font-weight: bold; color: #212529; }
        .quarter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .quarter-nav { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .year-view-container { overflow-x: auto; }
        .year-grid { display: grid; grid-template-columns: repeat(2, minmax(350px, 1fr)); gap: 20px; }
        .single-month-grid { background: white; border-radius: 20px; padding: 15px; border: 1px solid #dee2e6; }
        .single-month-title { font-size: 1rem; font-weight: bold; text-align: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #6c757d; }
        .small-calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 0.7rem; background: #6c757d; color: white; border-radius: 10px; padding: 6px 0; margin-bottom: 8px; }
        .small-calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .small-calendar-day { border: 1px solid #dee2e6; border-radius: 8px; min-height: 55px; padding: 4px; cursor: pointer; background: white; }
        .small-calendar-day.other-month { background: #fafcff; color: #94a3b8; }
        .small-day-number { font-weight: bold; font-size: 0.7rem; text-align: right; }
        .small-event-item { background: #e8a0a0; border-radius: 4px; padding: 1px 3px; margin: 1px 0; font-size: 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .timeline-wrapper { overflow-x: auto; max-height: 70vh; border-radius: 20px; border: 1px solid #dee2e6; background: white; }
        .timeline-months { display: flex; }
        .timeline-month-col { border-right: 3px solid #6c757d; min-width: 500px; }
        .timeline-month-header { background: #6c757d; color: white; padding: 12px 16px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 20; }
        .timeline-day-row { display: flex; }
        .timeline-day-cell { width: 70px; min-width: 70px; padding: 10px 4px; text-align: center; border-right: 1px solid #e9ecef; cursor: pointer; }
        .timeline-day-cell.weekend { background: #f8f0e6; }
        .timeline-day-cell.today { background: #b8e1fc; font-weight: bold; }
        .timeline-event-badge { background: #e8a0a0; border-radius: 10px; padding: 2px 5px; font-size: 0.55rem; white-space: nowrap; display: inline-block; margin: 1px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-container { background: white; border-radius: 32px; width: 90%; max-width: 600px; max-height: 85vh; overflow: hidden; }
        .modal-tabs { display: flex; border-bottom: 2px solid #e2edf2; }
        .tab-btn { flex: 1; padding: 16px; background: #f8fafc; border: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: white; color: #2c7da0; border-bottom: 3px solid #2c7da0; }
        .tab-content { padding: 20px; overflow-y: auto; max-height: 60vh; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .event-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #edf2f7; margin-bottom: 8px; }
        .event-actions { display: flex; gap: 8px; }
        .edit-event-btn { background: #f0c8a0; padding: 4px 12px; border-radius: 20px; border: none; cursor: pointer; }
        .delete-event-btn { background: #f0b8b8; padding: 4px 12px; border-radius: 20px; border: none; cursor: pointer; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .color-palette { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .palette-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .palette-swatch.selected { border: 3px solid #0f3b5f; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .btn-save { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; }
        .btn-cancel { background: #e2e8f0; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; }
        .year-selector { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        footer { text-align: center; font-size: 0.7rem; padding: 12px; color: #5c6f87; }
    </style>
</head>
<body>
<div id="app"><div class="loading">Iniciando agenda com segurança...</div></div>

<script type="module">
    // CDNs universais via unpkg - resolvem o bloqueio de tela branca no GitHub Pages
    import { initializeApp } from "https://unpkg.com/@firebase/app@0.9.24/dist/index.mjs";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://unpkg.com/@firebase/auth@1.3.1/dist/index.mjs";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://unpkg.com/@firebase/firestore@4.3.1/dist/index.mjs";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBLIWcjvXouacuZ-WGJncY-ixbqqbRQMSM",
        authDomain: "agenda-calendario-aps.firebaseapp.com",
        projectId: "agenda-calendario-aps",
        storageBucket: "agenda-calendario-aps.firebasestorage.app",
        messagingSenderId: "174124394971",
        appId: "1:174124394971:web:14d13869040f1450b55ffe"
    };
    
    let app, auth, db, provider;
    
    try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        provider = new GoogleAuthProvider();
    } catch (e) {
        console.error("Erro ao pré-carregar Firebase: ", e);
    }
    
    let currentUser = null;
    let events = [];
    let currentView = "month";
    let currentYear = 2026;
    let currentMonth = 5;
    let showHolidays = true;
    let showPersonalEvents = true;
    let timelineYear = 2026;
    let lockAuthStream = false;
    
    const SOFT_COLORS = ["#e8a0a0", "#d4a8e8", "#a8d4e8", "#b8e0b8", "#f0d8a0", "#e8c8a0", "#c8b8e8", "#a0e8d4", "#f0a8c8", "#d0e0a0"];
    
    const DEFAULT_HOLIDAYS = [
        { id: 1, name: "Confraternização Universal", type: "national", start: "2026-01-01", end: "2026-01-01", repeatType: "permanent", color: "#e8a0a0" },
        { id: 2, name: "Tiradentes", type: "national", start: "2026-04-21", end: "2026-04-21", repeatType: "permanent", color: "#e8a0a0" },
        { id: 3, name: "Dia do Trabalho", type: "national", start: "2026-05-01", end: "2026-05-01", repeatType: "permanent", color: "#e8a0a0" },
        { id: 4, name: "Independência do Brasil", type: "national", start: "2026-09-07", end: "2026-09-07", repeatType: "permanent", color: "#e8a0a0" },
        { id: 5, name: "Nossa Senhora Aparecida", type: "national", start: "2026-10-12", end: "2026-10-12", repeatType: "permanent", color: "#e8a0a0" },
        { id: 6, name: "Finados", type: "national", start: "2026-11-02", end: "2026-11-02", repeatType: "permanent", color: "#e8a0a0" },
        { id: 7, name: "Proclamação da República", type: "national", start: "2026-11-15", end: "2026-11-15", repeatType: "permanent", color: "#e8a0a0" },
        { id: 8, name: "Natal", type: "national", start: "2026-12-25", end: "2026-12-25", repeatType: "permanent", color: "#e8a0a0" }
    ];
    
    async function loadUserEvents(userId) {
        try {
            const userDocRef = doc(db, "users", userId);
            const docSnap = await getDoc(userDocRef);
            if (docSnap.exists()) {
                events = docSnap.data().events || [];
            } else {
                events = [...DEFAULT_HOLIDAYS];
                await setDoc(userDocRef, { events: events });
            }
        } catch (error) {
            console.error("Erro ao acessar o Firestore:", error);
            if(events.length === 0) events = [...DEFAULT_HOLIDAYS]; 
        }
        renderMainApp();
    }
    
    function getEventsForDate(year, month, day) {
        return events.filter(ev => {
            if (ev.type === 'national' && !showHolidays) return false;
            if (ev.type !== 'national' && !showPersonalEvents) return false;
            if (ev.repeatType === 'permanent') {
                const s = new Date(ev.start), e = new Date(ev.end);
                const startComp = new Date(year, s.getMonth(), s.getDate());
                const endComp = new Date(year, e.getMonth(), e.getDate());
                const targetDate = new Date(year, month, day);
                if (ev.start === ev.end) return startComp.getMonth() === month && startComp.getDate() === day;
                return targetDate >= startComp && targetDate <= endComp;
            } else {
                const targetDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                if (ev.start === ev.end && ev.start === targetDateStr) return true;
                return ev.start <= targetDateStr && ev.end >= targetDateStr;
            }
        });
    }
    
    async function addEvent(event) {
        event.id = Date.now();
        events.push(event);
        try {
            if (currentUser) await updateDoc(doc(db, "users", currentUser.uid), { events: arrayUnion(event) });
        } catch(e) { console.error(e); }
        renderCurrentView();
        renderCadastroList();
    }
    
    async function deleteEvent(id) {
        const eventToRemove = events.find(e => e.id == id);
        events = events.filter(e => e.id != id);
        try {
            if (currentUser && eventToRemove) await updateDoc(doc(db, "users", currentUser.uid), { events: arrayRemove(eventToRemove) });
        } catch(e) { console.error(e); }
        renderCurrentView();
        renderCadastroList();
    }
    
    function showDetailModal(dateStr, eventsOfDay) {
        const modal =
