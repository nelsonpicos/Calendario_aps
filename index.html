<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AGENDA DE FÉRIAS DA APS - Calendário Avançado</title>
    <!-- html2pdf Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #e9f0f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .page-main-title {
            text-align: center;
            background: linear-gradient(135deg, #1b5e7a 0%, #2c8cb0 100%);
            color: white;
            padding: 20px 24px;
            border-bottom: 4px solid #ffcd6b;
            font-size: 1.8rem;
            font-weight: 800;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 50px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1b5e7a;
        }
        .logout-btn {
            background: white;
            color: #1b5e7a;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .main-calendar {
            padding: 24px 28px;
            background: white;
            overflow-x: auto;
        }
        
        /* BARRA DE FERRAMENTAS - BOTÕES NA MESMA LINHA */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2edf2;
        }
        .view-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .view-btn {
            background: white;
            color: #1e4a6e;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-btn.active {
            background: #2c7da0;
            color: white;
            border-color: #2c7da0;
        }
        .action-btn {
            background: white;
            color: #1e4a6e;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .btn-pdf {
            background: white;
            border-color: #cbd5e1;
        }
        .btn-pdf:hover {
            background: #f1f5f9;
        }
        
        /* CALENDÁRIO - CORES PRETAS VIVAS NAS GRADES */
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            background: #1a1a2e;
            color: white;
            border-radius: 16px;
            padding: 12px 0;
            margin-bottom: 12px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            background: white;
            border: 2px solid #2d2d2d;
            border-radius: 12px;
            min-height: 100px;
            padding: 8px 6px;
            cursor: pointer;
            transition: 0.1s;
        }
        .calendar-day:hover {
            background: #f8fafc;
            transform: scale(0.98);
            border-color: #000;
        }
        .calendar-day.other-month {
            background: #fafcff;
            color: #94a3b8;
            border-color: #cbd5e1;
        }
        .day-number {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 8px;
            text-align: right;
            color: #1a1a2e;
        }
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.7rem;
        }
        .event-item {
            border-radius: 14px;
            padding: 2px 6px;
            background: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bar-event {
            color: white;
            border-radius: 20px;
            font-weight: 500;
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .month-nav button {
            background: #1a1a2e;
            color: white;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .month-nav button:hover {
            background: #2d2d44;
        }
        .current-month {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1a1a2e;
        }
        
        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-tabs {
            display: flex;
            border-bottom: 2px solid #e2edf2;
        }
        .tab-btn {
            flex: 1;
            padding: 16px;
            background: #f8fafc;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #5c6f87;
        }
        .tab-btn.active {
            background: white;
            color: #2c7da0;
            border-bottom: 3px solid #2c7da0;
        }
        .tab-content {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .event-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            background: #fefefe;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .event-info {
            flex: 1;
        }
        .event-name {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .event-details {
            font-size: 0.7rem;
            color: #5c6f87;
        }
        .event-actions {
            display: flex;
            gap: 8px;
        }
        .event-actions button {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            border: none;
        }
        .edit-event-btn {
            background: #f0c8a0;
            color: #8a6a3a;
        }
        .delete-event-btn {
            background: #f0b8b8;
            color: #8b3a3a;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e5a7d;
        }
        .form-group input, .form-group select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        .palette-swatch {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s;
        }
        .palette-swatch.selected {
            border: 3px solid #0f3b5f;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #2c7da0;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .btn-save {
            background: #2c7da0;
            color: white;
        }
        .btn-cancel {
            background: #e2e8f0;
            color: #1e4a6e;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 12px;
            color: #5c6f87;
        }
        
        /* ESTILO PEQUENO PARA SEMESTRE/ANO */
        .small-calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            font-size: 0.7rem;
            background: #1a1a2e;
            color: white;
            border-radius: 12px;
            padding: 6px 0;
            margin-bottom: 8px;
        }
        .small-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .small-calendar-day {
            border: 1px solid #2d2d2d;
            border-radius: 10px;
            min-height: 55px;
            padding: 4px;
            cursor: pointer;
            background: white;
        }
        .small-calendar-day.other-month {
            background: #fafcff;
            color: #94a3b8;
            border-color: #cbd5e1;
        }
        .small-day-number {
            font-weight: bold;
            font-size: 0.7rem;
            text-align: right;
            color: #1a1a2e;
        }
        .single-month-grid {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #e2edf2;
        }
        .single-month-title {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            color: #1a1a2e;
        }
        .months-grid-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .nav-buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-buttons-container button {
            background: #1a1a2e;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        
        /* ESTILO PARA PDF */
        .pdf-content {
            padding: 20px;
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: white;
        }
        .pdf-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .pdf-header h1 {
            color: #1b5e7a;
            margin-bottom: 5px;
        }
        .pdf-month {
            margin-bottom: 30px;
            page-break-inside: avoid;
        }
        .pdf-month-title {
            font-size: 1.3rem;
            font-weight: bold;
            background: #1a1a2e;
            color: white;
            padding: 8px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .pdf-calendar {
            width: 100%;
            border-collapse: collapse;
        }
        .pdf-calendar th {
            background: #1a1a2e;
            color: white;
            padding: 10px;
            border: 1px solid #2d2d2d;
            font-size: 0.85rem;
        }
        .pdf-calendar td {
            border: 1px solid #2d2d2d;
            padding: 8px;
            vertical-align: top;
            height: 70px;
            width: 14%;
        }
        .pdf-day-number {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #1a1a2e;
        }
        .pdf-event {
            font-size: 0.65rem;
            padding: 3px 5px;
            margin: 2px 0;
            border-radius: 8px;
            color: white;
            white-space: normal;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-main-title">
        <span>📅 AGENDA DE FÉRIAS DA APS</span>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">U</div>
            <span class="user-name" id="userName">Usuário</span>
            <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
    </div>
    
    <div class="main-calendar">
        <!-- BARRA DE FERRAMENTAS - BOTÕES NA MESMA LINHA -->
        <div class="toolbar">
            <div class="view-buttons">
                <button class="view-btn" data-view="month">📆 Mês</button>
                <button class="view-btn" data-view="semester">📚 Semestre</button>
                <button class="view-btn" data-view="year">🗓️ Ano</button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="btnFeriado">➕ Feriado</button>
                <button class="action-btn" id="btnEvento">📌 + Evento</button>
                <button class="action-btn" id="btnCadastro">📋 Cadastros</button>
                <button class="action-btn btn-pdf" id="btnPDF">📄 Gerar PDF</button>
            </div>
        </div>
        
        <div id="dynamicViewContainer"></div>
        <footer>Clique em qualquer dia para ver detalhes</footer>
    </div>
</div>

<script>
    // ==================== DADOS ====================
    let events = [];
    let currentUser = { id: 'user1', name: 'Usuário' };
    let currentView = "month";
    let currentYear = 2026;
    let currentMonth = 5; // Junho
    
    // Cores suaves
    const SOFT_COLORS = [
        "#e8a0a0", "#d4a8e8", "#a8d4e8", "#b8e0b8", "#f0d8a0",
        "#e8c8a0", "#c8b8e8", "#a0e8d4", "#f0a8c8", "#d0e0a0",
        "#e8a0c8", "#a0d0e8", "#c8e0a0", "#f0c0a0", "#a0e0c0"
    ];
    
    function loadData() {
        const stored = localStorage.getItem('aps_calendar_events');
        if(stored) {
            events = JSON.parse(stored);
        } else {
            events = [
                { id: 1, name: "Confraternização Universal", type: "national", start: "2026-01-01", end: "2026-01-01", repeatType: "permanent", color: "#e8a0a0" },
                { id: 2, name: "Tiradentes", type: "national", start: "2026-04-21", end: "2026-04-21", repeatType: "permanent", color: "#e8a0a0" },
                { id: 3, name: "Dia do Trabalho", type: "national", start: "2026-05-01", end: "2026-05-01", repeatType: "permanent", color: "#e8a0a0" },
                { id: 4, name: "Independência do Brasil", type: "national", start: "2026-09-07", end: "2026-09-07", repeatType: "permanent", color: "#e8a0a0" },
                { id: 5, name: "Nossa Senhora Aparecida", type: "national", start: "2026-10-12", end: "2026-10-12", repeatType: "permanent", color: "#e8a0a0" },
                { id: 6, name: "Finados", type: "national", start: "2026-11-02", end: "2026-11-02", repeatType: "permanent", color: "#e8a0a0" },
                { id: 7, name: "Proclamação da República", type: "national", start: "2026-11-15", end: "2026-11-15", repeatType: "permanent", color: "#e8a0a0" },
                { id: 8, name: "Natal", type: "national", start: "2026-12-25", end: "2026-12-25", repeatType: "permanent", color: "#e8a0a0" }
            ];
            saveData();
        }
    }
    
    function saveData() {
        localStorage.setItem('aps_calendar_events', JSON.stringify(events));
    }
    
    function addEvent(event) {
        event.id = Date.now();
        events.push(event);
        saveData();
        renderCurrentView();
    }
    
    function updateEvent(id, updatedEvent) {
        const index = events.findIndex(e => e.id == id);
        if(index !== -1) {
            events[index] = { ...events[index], ...updatedEvent };
            saveData();
            renderCurrentView();
        }
    }
    
    function deleteEvent(id) {
        events = events.filter(e => e.id != id);
        saveData();
        renderCurrentView();
    }
    
    function getEventsForDate(year, month, day) {
        const targetDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const targetDate = new Date(year, month, day);
        return events.filter(ev => {
            if(ev.repeatType === 'permanent') {
                const s = new Date(ev.start), e = new Date(ev.end);
                let startComp = new Date(year, s.getMonth(), s.getDate());
                let endComp = new Date(year, e.getMonth(), e.getDate());
                if(ev.start === ev.end) return startComp.getMonth() === month && startComp.getDate() === day;
                return targetDate >= startComp && targetDate <= endComp;
            } else {
                if(ev.start === ev.end && ev.start === targetDateStr) return true;
                return ev.start <= targetDateStr && ev.end >= targetDateStr;
            }
        });
    }
    
    function showDetailModal(dateStr, eventsOfDay) {
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        let eventsHtml = eventsOfDay.length ? eventsOfDay.map(ev => `<li style="margin:8px 0; border-left:4px solid ${ev.color}; padding-left:8px;"><strong>${ev.name}</strong> (${ev.type === 'national' ? 'Feriado' : 'Evento'})</li>`).join('') : '<li>Nenhum evento cadastrado</li>';
        modal.innerHTML = `<div class="modal-container" style="max-width:400px;"><div style="padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2edf2;"><h3 style="margin:0;">📅 ${dateStr}</h3><button class="btn-cancel" style="background:transparent; font-size:1.5rem; border:none; cursor:pointer;" id="closeModalBtn">✕</button></div><div style="padding:20px;"><ul>${eventsHtml}</ul><button class="btn-cancel" id="closeModalBtn2" style="width:100%; padding:10px; border:none; border-radius:30px; cursor:pointer;">Fechar</button></div></div>`;
        document.body.appendChild(modal);
        const close = () => modal.remove();
        modal.querySelector('#closeModalBtn')?.addEventListener('click', close);
        modal.querySelector('#closeModalBtn2')?.addEventListener('click', close);
        modal.addEventListener('click', (e) => { if(e.target === modal) close(); });
    }
    
    // ==================== RENDER CALENDÁRIO MÊS ====================
    function renderMonthView() {
        const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const header = `
            <div class="month-nav">
                <button id="prevMonthBtn">◀ Mês anterior</button>
                <span class="current-month">${monthNames[currentMonth]} ${currentYear}</span>
                <button id="nextMonthBtn">Próximo mês ▶</button>
            </div>
            <div id="monthGrid"></div>
        `;
        document.getElementById('dynamicViewContainer').innerHTML = header;
        renderMonthGrid(currentYear, currentMonth, 'monthGrid');
        
        document.getElementById('prevMonthBtn')?.addEventListener('click', () => {
            let d = new Date(currentYear, currentMonth - 1, 1);
            currentYear = d.getFullYear();
            currentMonth = d.getMonth();
            renderMonthView();
        });
        document.getElementById('nextMonthBtn')?.addEventListener('click', () => {
            let d = new Date(currentYear, currentMonth + 1, 1);
            currentYear = d.getFullYear();
            currentMonth = d.getMonth();
            renderMonthView();
        });
    }
    
    function renderMonthGrid(year, month, containerId) {
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();
        let cells = [];
        for(let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevDays - i, current: false, date: new Date(year, month - 1, prevDays - i) });
        for(let d = 1; d <= daysInMonth; d++) cells.push({ day: d, current: true, date: new Date(year, month, d) });
        let remaining = 42 - cells.length;
        for(let i = 1; i <= remaining; i++) cells.push({ day: i, current: false, date: new Date(year, month + 1, i) });
        
        let html = `<div class="calendar-header"><div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div></div><div class="calendar-grid">`;
        for(let cell of cells) {
            const y = cell.date.getFullYear(), m = cell.date.getMonth(), d = cell.day;
            const evs = getEventsForDate(y, m, d);
            let evHtml = '';
            for(let ev of evs) {
                const isRange = ev.start !== ev.end;
                if(isRange) evHtml += `<div class="event-item bar-event" style="background:${ev.color};">📅 ${ev.name}</div>`;
                else evHtml += `<div class="event-item" style="background:${ev.color}30; border-left:3px solid ${ev.color};">${ev.name}</div>`;
            }
            const cls = cell.current ? '' : 'other-month';
            html += `<div class="calendar-day ${cls}" data-year="${y}" data-month="${m}" data-day="${d}"><div class="day-number">${d}</div><div class="event-list">${evHtml || '<span style="font-size:0.6rem; color:#aaa;">—</span>'}</div></div>`;
        }
        html += `</div>`;
        document.getElementById(containerId).innerHTML = html;
        
        document.querySelectorAll('.calendar-day').forEach(el => {
            el.addEventListener('click', () => {
                let y = parseInt(el.dataset.year), m = parseInt(el.dataset.month), d = parseInt(el.dataset.day);
                let evs = getEventsForDate(y, m, d);
                showDetailModal(`${y}-${m+1}-${d}`, evs);
            });
        });
    }
    
    // ==================== SEMESTRE E ANO ====================
    function renderSemesterView() {
        let html = `<div class="months-grid-container">`;
        const startSem = currentMonth - (currentMonth % 6);
        for(let i = 0; i < 6; i++) {
            let monthIdx = startSem + i;
            let monthYear = currentYear + Math.floor(monthIdx / 12);
            let monthMod = monthIdx % 12;
            let monthName = new Date(monthYear, monthMod, 1).toLocaleString('pt-BR', { month: 'long' });
            html += `<div class="single-month-grid"><div class="single-month-title">${monthName.toUpperCase()} / ${monthYear}</div>`;
            html += renderSmallMonthGrid(monthYear, monthMod);
            html += `</div>`;
        }
        html += `</div><div class="nav-buttons-container"><button id="prevSemBtn">◀ Semestre anterior</button><button id="nextSemBtn">Próximo semestre ▶</button></div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        
        document.getElementById('prevSemBtn')?.addEventListener('click', () => {
            let newMonth = currentMonth - 6;
            if(newMonth < 0) { currentYear--; currentMonth = newMonth + 12; }
            else { currentMonth = newMonth; }
            renderSemesterView();
        });
        document.getElementById('nextSemBtn')?.addEventListener('click', () => {
            let newMonth = currentMonth + 6;
            if(newMonth >= 12) { currentYear++; currentMonth = newMonth - 12; }
            else { currentMonth = newMonth; }
            renderSemesterView();
        });
        attachSmallCalendarClicks();
    }
    
    function renderYearView() {
        let html = `<div class="months-grid-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:20px;">`;
        for(let m = 0; m < 12; m++) {
            let monthName = new Date(currentYear, m, 1).toLocaleString('pt-BR', { month: 'long' });
            html += `<div class="single-month-grid"><div class="single-month-title">${monthName.toUpperCase()} / ${currentYear}</div>`;
            html += renderSmallMonthGrid(currentYear, m);
            html += `</div>`;
        }
        html += `</div><div class="nav-buttons-container"><button id="prevYearBtn">◀ ${currentYear-1}</button><span style="font-weight:bold; font-size:1.2rem;">${currentYear}</span><button id="nextYearBtn">${currentYear+1} ▶</button></div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        
        document.getElementById('prevYearBtn')?.addEventListener('click', () => { currentYear--; renderYearView(); });
        document.getElementById('nextYearBtn')?.addEventListener('click', () => { currentYear++; renderYearView(); });
        attachSmallCalendarClicks();
    }
    
    function renderSmallMonthGrid(year, month) {
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();
        let cells = [];
        for(let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevDays - i, current: false, date: new Date(year, month - 1, prevDays - i) });
        for(let d = 1; d <= daysInMonth; d++) cells.push({ day: d, current: true, date: new Date(year, month, d) });
        let remaining = 42 - cells.length;
        for(let i = 1; i <= remaining; i++) cells.push({ day: i, current: false, date: new Date(year, month + 1, i) });
        
        let html = `<div class="small-calendar-header"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div><div class="small-calendar-grid">`;
        for(let cell of cells) {
            const y = cell.date.getFullYear(), m = cell.date.getMonth(), d = cell.day;
            const evs = getEventsForDate(y, m, d);
            let evHtml = '';
            for(let ev of evs) {
                evHtml += `<div style="background:${ev.color}40; border-left:2px solid ${ev.color}; padding:1px 2px; margin:1px 0; border-radius:4px; font-size:0.55rem;">${ev.name.substring(0,8)}</div>`;
            }
            const cls = cell.current ? '' : 'other-month';
            html += `<div class="small-calendar-day ${cls}" data-year="${y}" data-month="${m}" data-day="${d}"><div class="small-day-number">${d}</div><div style="font-size:0.55rem;">${evHtml || '-'}</div></div>`;
        }
        html += `</div>`;
        return html;
    }
    
    function attachSmallCalendarClicks() {
        document.querySelectorAll('.small-calendar-day').forEach(el => {
            el.addEventListener('click', () => {
                let y = parseInt(el.dataset.year), m = parseInt(el.dataset.month), d = parseInt(el.dataset.day);
                let evs = getEventsForDate(y, m, d);
                showDetailModal(`${y}-${m+1}-${d}`, evs);
            });
        });
    }
    
    function renderCurrentView() {
        if(currentView === 'month') renderMonthView();
        else if(currentView === 'semester') renderSemesterView();
        else if(currentView === 'year') renderYearView();
    }
    
    // ==================== MODAIS ====================
    let currentEditingId = null;
    
    function openEventModal(type, eventToEdit = null) {
        currentEditingId = eventToEdit?.id || null;
        const isEdit = !!eventToEdit;
        const title = isEdit ? `Editar ${type === 'national' ? 'Feriado' : 'Evento'}` : `Adicionar ${type === 'national' ? 'Feriado' : 'Evento'}`;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-container" style="max-width:500px;">
                <div style="padding:16px 20px; border-bottom:1px solid #e2edf2; display:flex; justify-content:space-between;">
                    <h3 style="margin:0;">${title}</h3>
                    <button class="btn-cancel" style="background:transparent; font-size:1.5rem; border:none; cursor:pointer;" id="closeModalBtn">✕</button>
                </div>
                <div style="padding:20px;">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="eventName" value="${eventToEdit?.name || ''}" placeholder="Ex: Natal, Férias João">
                    </div>
                    <div class="form-group">
                        <label>Data de Início</label>
                        <input type="date" id="startDate" value="${eventToEdit?.start || ''}">
                    </div>
                    <div class="form-group">
                        <label>Data de Fim (opcional)</label>
                        <input type="date" id="endDate" value="${eventToEdit?.end || ''}">
                    </div>
                    <div class="form-group">
                        <label>Repetir</label>
                        <select id="repeatType">
                            <option value="single" ${eventToEdit?.repeatType === 'single' ? 'selected' : ''}>📅 Somente este ano</option>
                            <option value="permanent" ${eventToEdit?.repeatType === 'permanent' ? 'selected' : ''}>♾️ Todos os anos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cor do Evento</label>
                        <div class="color-palette" id="colorPaletteModal"></div>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="cancelModalBtn">Cancelar</button>
                        <button class="btn-save" id="saveModalBtn">${isEdit ? 'Salvar' : 'Adicionar'}</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const paletteContainer = modal.querySelector('#colorPaletteModal');
        SOFT_COLORS.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = `palette-swatch ${eventToEdit?.color === color ? 'selected' : ''}`;
            swatch.style.background = color;
            swatch.dataset.color = color;
            swatch.addEventListener('click', () => {
                paletteContainer.querySelectorAll('.palette-swatch').forEach(s => s.classList.remove('selected'));
                swatch.classList.add('selected');
            });
            paletteContainer.appendChild(swatch);
        });
        
        const close = () => modal.remove();
        modal.querySelector('#closeModalBtn')?.addEventListener('click', close);
        modal.querySelector('#cancelModalBtn')?.addEventListener('click', close);
        modal.addEventListener('click', (e) => { if(e.target === modal) close(); });
        
        modal.querySelector('#saveModalBtn')?.addEventListener('click', () => {
            const name = modal.querySelector('#eventName').value.trim();
            const startDate = modal.querySelector('#startDate').value;
            let endDate = modal.querySelector('#endDate').value;
            const repeatType = modal.querySelector('#repeatType').value;
            let color = paletteContainer.querySelector('.palette-swatch.selected')?.dataset.color || SOFT_COLORS[0];
            
            if(!name || !startDate) {
                alert("Preencha nome e data de início");
                return;
            }
            if(!endDate) endDate = startDate;
            if(startDate > endDate) {
                alert("Data final não pode ser anterior à inicial");
                return;
            }
            
            if(isEdit) {
                updateEvent(currentEditingId, { name, start: startDate, end: endDate, repeatType, color, type: eventToEdit.type });
            } else {
                addEvent({ name, type, start: startDate, end: endDate, repeatType, color });
            }
            close();
        });
    }
    
    function openCadastroModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-container">
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="eventos">📋 Eventos</button>
                    <button class="tab-btn" data-tab="feriados">🏛️ Feriados</button>
                </div>
                <div class="tab-content">
                    <div class="tab-pane active" id="tab-eventos">
                        <div id="eventosList"></div>
                    </div>
                    <div class="tab-pane" id="tab-feriados">
                        <div id="feriadosList"></div>
                    </div>
                </div>
                <div style="padding:16px; border-top:1px solid #e2edf2;">
                    <button class="btn-cancel" id="closeCadastroBtn" style="width:100%; padding:10px; border:none; border-radius:30px; cursor:pointer;">Fechar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const eventosList = modal.querySelector('#eventosList');
        const feriadosList = modal.querySelector('#feriadosList');
        
        function renderLists() {
            const eventos = events.filter(e => e.type !== 'national');
            const feriados = events.filter(e => e.type === 'national');
            
            eventosList.innerHTML = eventos.length ? eventos.map(ev => `
                <div class="event-list-item">
                    <div class="event-info">
                        <div class="event-name">${ev.name}</div>
                        <div class="event-details">${ev.start} ${ev.start !== ev.end ? ` até ${ev.end}` : ''} | ${ev.repeatType === 'permanent' ? '♾️ Anual' : '📅 Este ano'}</div>
                    </div>
                    <div class="event-actions">
                        <button class="edit-event-btn" data-id="${ev.id}">✏️ Editar</button>
                        <button class="delete-event-btn" data-id="${ev.id}">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('') : '<div style="text-align:center; padding:20px; color:#888;">Nenhum evento cadastrado</div>';
            
            feriadosList.innerHTML = feriados.length ? feriados.map(ev => `
                <div class="event-list-item">
                    <div class="event-info">
                        <div class="event-name">${ev.name}</div>
                        <div class="event-details">${ev.start} | ${ev.repeatType === 'permanent' ? '♾️ Anual' : '📅 Este ano'}</div>
                    </div>
                    <div class="event-actions">
                        <button class="edit-event-btn" data-id="${ev.id}">✏️ Editar</button>
                        <button class="delete-event-btn" data-id="${ev.id}">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('') : '<div style="text-align:center; padding:20px; color:#888;">Nenhum feriado cadastrado</div>';
            
            modal.querySelectorAll('.edit-event-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    const ev = events.find(e => e.id === id);
                    if(ev) {
                        modal.remove();
                        openEventModal(ev.type, ev);
                    }
                });
            });
            
            modal.querySelectorAll('.delete-event-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if(confirm("Tem certeza que deseja excluir este evento?")) {
                        deleteEvent(parseInt(btn.dataset.id));
                        renderLists();
                    }
                });
            });
        }
        
        renderLists();
        
        const tabs = modal.querySelectorAll('.tab-btn');
        const panes = modal.querySelectorAll('.tab-pane');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panes.forEach(p => p.classList.remove('active'));
                modal.querySelector(`#tab-${tab.dataset.tab}`).classList.add('active');
            });
        });
        
        modal.querySelector('#closeCadastroBtn')?.addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }
    
    // ==================== GERAR PDF ====================
    function generatePDF() {
        const year = currentYear;
        
        // Criar elemento temporário para o PDF
        const pdfElement = document.createElement('div');
        pdfElement.style.position = 'absolute';
        pdfElement.style.left = '-9999px';
        pdfElement.style.top = '0';
        pdfElement.style.width = '1200px';
        pdfElement.style.backgroundColor = 'white';
        pdfElement.style.padding = '20px';
        
        let pdfHtml = `
            <div class="pdf-content">
                <div class="pdf-header">
                    <h1>📅 AGENDA DE FÉRIAS DA APS</h1>
                    <h2>Ano ${year}</h2>
                    <p>Gerado em: ${new Date().toLocaleDateString('pt-BR')}</p>
                </div>
        `;
        
        for(let month = 0; month < 12; month++) {
            const monthName = new Date(year, month, 1).toLocaleString('pt-BR', { month: 'long' });
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            
            pdfHtml += `<div class="pdf-month"><div class="pdf-month-title">${monthName.toUpperCase()} / ${year}</div>`;
            pdfHtml += `<table class="pdf-calendar"><thead><tr>`;
            const weekDays = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
            weekDays.forEach(day => {
                pdfHtml += `<th>${day}</th>`;
            });
            pdfHtml += `</tr></thead><tbody><tr>`;
            
            let dayCount = 1;
            
            // Dias vazios antes do primeiro dia
            for(let i = 0; i < firstDay; i++) {
                pdfHtml += `<td style="background:#f5f5f5;"></td>`;
            }
            
            // Dias do mês
            for(let d = 1; d <= daysInMonth; d++) {
                const evs = getEventsForDate(year, month, d);
                let eventsHtml = '';
                for(let ev of evs) {
                    eventsHtml += `<div class="pdf-event" style="background:${ev.color};">${ev.name}</div>`;
                }
                pdfHtml += `<td><div class="pdf-day-number">${d}</div>${eventsHtml}</td>`;
                
                // Quebrar linha a cada 7 dias
                if((firstDay + d) % 7 === 0 && d < daysInMonth) {
                    pdfHtml += `</tr><tr>`;
                }
            }
            
            // Completar a última linha
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 7 - (totalCells % 7);
            if(remainingCells < 7) {
                for(let i = 0; i < remainingCells; i++) {
                    pdfHtml += `<td style="background:#f5f5f5;"></td>`;
                }
            }
            
            pdfHtml += `</tr></tbody></table></div>`;
        }
        
        pdfHtml += `</div>`;
        pdfElement.innerHTML = pdfHtml;
        
        // Adicionar estilos para o PDF
        const style = document.createElement('style');
        style.textContent = `
            .pdf-content { font-family: system-ui, 'Segoe UI', sans-serif; background: white; }
            .pdf-header { text-align: center; margin-bottom: 30px; }
            .pdf-header h1 { color: #1b5e7a; margin-bottom: 5px; }
            .pdf-month { margin-bottom: 30px; page-break-inside: avoid; }
            .pdf-month-title { font-size: 1.3rem; font-weight: bold; background: #1a1a2e; color: white; padding: 8px; text-align: center; border-radius: 12px; margin-bottom: 10px; }
            .pdf-calendar { width: 100%; border-collapse: collapse; }
            .pdf-calendar th { background: #1a1a2e; color: white; padding: 10px; border: 1px solid #2d2d2d; font-size: 0.85rem; }
            .pdf-calendar td { border: 1px solid #2d2d2d; padding: 8px; vertical-align: top; height: 70px; width: 14%; }
            .pdf-day-number { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #1a1a2e; }
            .pdf-event { font-size: 0.65rem; padding: 3px 5px; margin: 2px 0; border-radius: 8px; color: white; white-space: normal; word-wrap: break-word; }
        `;
        pdfElement.appendChild(style);
        document.body.appendChild(pdfElement);
        
        // Configuração do PDF
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `agenda_ferias_aps_${year}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        
        // Gerar PDF
        html2pdf().set(opt).from(pdfElement).save().then(() => {
            document.body.removeChild(pdfElement);
        }).catch(err => {
            console.error('Erro ao gerar PDF:', err);
            alert('Erro ao gerar PDF. Tente novamente ou use a impressão do navegador (Ctrl+P).');
            document.body.removeChild(pdfElement);
        });
    }
    
    // ==================== INICIALIZAÇÃO ====================
    loadData();
    renderCurrentView();
    
    document.getElementById('btnFeriado')?.addEventListener('click', () => openEventModal('national'));
    document.getElementById('btnEvento')?.addEventListener('click', () => openEventModal('personal'));
    document.getElementById('btnCadastro')?.addEventListener('click', openCadastroModal);
    document.getElementById('btnPDF')?.addEventListener('click', generatePDF);
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        if(confirm("Deseja sair? Seus dados permanecem salvos.")) {
            // Simular logout
            alert("Logout realizado. Os dados continuam salvos no navegador.");
        }
    });
    
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.dataset.view;
            renderCurrentView();
        });
    });
    document.querySelector('.view-btn[data-view="month"]')?.classList.add('active');
</script>
</body>
