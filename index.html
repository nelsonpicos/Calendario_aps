<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AGENDA DE FÉRIAS DA APS - Calendário Avançado</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #e9f0f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* TÍTULO PRINCIPAL - TOPO TOTAL */
        .page-main-title {
            text-align: center;
            background: linear-gradient(135deg, #0f3b5f 0%, #1b5a7a 100%);
            color: white;
            padding: 20px 24px;
            border-bottom: 4px solid #ffcd6b;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            width: 100%;
        }
        .page-main-title span {
            font-size: 1rem;
            background: rgba(255,255,240,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: 12px;
            font-weight: normal;
            vertical-align: middle;
        }
        /* LAYOUT: SIDEBAR AGORA ABAIXO DO TÍTULO, AO LADO DO CALENDÁRIO */
        .content-row {
            display: flex;
            flex-wrap: wrap;
        }
        .sidebar {
            background: #f8fafc;
            width: 320px;
            padding: 24px 20px;
            border-right: 1px solid #dce4ec;
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .main-calendar {
            flex: 1;
            padding: 24px 28px;
            background: white;
            overflow-x: auto;
        }
        @media (max-width: 800px) {
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; max-height: 300px; }
            .page-main-title { font-size: 1.4rem; padding: 14px 16px; }
            .page-main-title span { font-size: 0.75rem; display: inline-block; margin-top: 6px; }
        }
        h2 {
            font-size: 1.4rem;
            margin: 0 0 12px 0;
            color: #0f3b5f;
            border-left: 5px solid #2c7da0;
            padding-left: 12px;
        }
        h3 {
            font-size: 1.1rem;
            margin: 16px 0 10px 0;
            color: #1e4a6e;
        }
        .form-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e5a7d;
        }
        input, select, button {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            background: white;
        }
        button {
            background: #2c7da0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        button:hover {
            background: #1f5e7a;
            transform: scale(0.98);
        }
        .btn-remove {
            background: #e03a3e;
            margin-top: 6px;
            font-size: 0.8rem;
        }
        .btn-remove:hover { background: #b91c1c; }
        .badge-list {
            background: white;
            border-radius: 20px;
            padding: 8px 12px;
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
        }
        .badge-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            border-bottom: 1px solid #edf2f7;
        }
        .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        /* VIEW BUTTONS */
        .view-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2edf2;
            padding-bottom: 12px;
        }
        .view-btn {
            background: #eef2ff;
            color: #1e4a6e;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .view-btn.active {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        /* CALENDAR VIEWS (MÊS PADRÃO) */
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            background: #d9e6f2;
            border-radius: 20px;
            padding: 12px 0;
            margin-bottom: 12px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            background: #ffffff;
            border: 1px solid #e2edf2;
            border-radius: 16px;
            min-height: 100px;
            padding: 8px 6px;
            transition: 0.1s;
            cursor: pointer;
        }
        .calendar-day.other-month { background: #fafcff; color: #94a3b8; }
        .day-number {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 8px;
            text-align: right;
            padding-right: 4px;
        }
        .event-list { display: flex; flex-direction: column; gap: 4px; font-size: 0.7rem; }
        .event-item {
            border-radius: 14px;
            padding: 2px 6px;
            background: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bar-event { background-color: #4f9da6; color: white; padding: 2px 6px; border-radius: 20px; font-weight: 500; }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .month-nav button {
            background: #e2e8f0;
            color: #1e4a6e;
            font-size: 1.2rem;
            padding: 6px 16px;
        }
        .current-month { font-size: 1.8rem; font-weight: bold; color: #0c4a6e; }
        
        /* NOVOS ESTILOS PARA SEMESTRE/ANO: BARRAS CONTÍNUAS E LEGENDA */
        .semester-grid, .year-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .month-card {
            background: #fefefe;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-width: 260px;
            flex: 1;
        }
        .month-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            color: #0c4a6e;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 6px;
        }
        .days-bar-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .day-bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
        }
        .day-number-small {
            width: 32px;
            font-weight: 600;
            text-align: right;
        }
        .event-bar {
            flex: 1;
            height: 24px;
            border-radius: 12px;
            background: #e9ecef;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .bar-segment {
            position: absolute;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 12px;
            transition: all 0.1s;
            background-color: #ccc;
        }
        .tooltip-hover {
            position: relative;
            z-index: 10;
        }
        .tooltip-hover:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 0;
            background: #1f2937;
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            white-space: nowrap;
            z-index: 200;
            pointer-events: none;
        }
        .legend-events {
            margin-top: 20px;
            padding: 12px 16px;
            background: #f1f8fe;
            border-radius: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.8rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 20px;
        }
        footer { text-align: center; font-size: 0.7rem; padding: 12px; color: #5c6f87; }
        
        /* TIMELINE */
        .timeline-container { overflow-x: auto; width: 100%; background: white; border-radius: 20px; border: 1px solid #e2edf2; }
        .timeline-months { display: flex; min-width: max-content; }
        .timeline-month-col { border-right: 3px solid #2c7da0; background: #fefefe; }
        .timeline-month-col:last-child { border-right: none; }
        .timeline-month-header { background: #d9e6f2; padding: 12px 16px; font-weight: bold; text-align: center; border-bottom: 2px solid #2c7da0; }
        .timeline-days { display: flex; flex-direction: column; }
        .timeline-day-row { display: flex; border-bottom: 1px solid #eef2ff; }
        .timeline-day-cell { width: 70px; min-width: 70px; padding: 10px 6px; text-align: center; border-right: 1px solid #e9ecef; background: #ffffff; cursor: pointer; font-size: 0.8rem; }
        .timeline-day-cell.weekend { background: #f8f0e6; }
        .timeline-day-cell.today { background: #b8e1fc; box-shadow: inset 0 0 0 2px #1e6f9f; font-weight: bold; }
        .timeline-day-cell:hover { background: #eef2ff; }
        .timeline-events { font-size: 0.65rem; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; }
        .timeline-event-badge { background: #4f9da6; color: white; border-radius: 12px; padding: 1px 6px; font-size: 0.6rem; white-space: nowrap; }
        .year-selector { display: flex; justify-content: center; gap: 20px; margin-top: 20px; align-items: center; }
        .modal-detail { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-card { background:white; border-radius:32px; padding:24px; max-width:400px; width:90%; }
        .close-modal { background:#e03a3e; margin-top:12px; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- TÍTULO OCUPA TOPO TOTAL -->
    <div class="page-main-title">
        📅 AGENDA DE FÉRIAS DA APS 
        <span>Planejamento integrado</span>
    </div>
    
    <div class="content-row">
        <div class="sidebar">
            <div>
                <h2>⚙️ Gerenciar</h2>
                <div class="form-group">
                    <label>➕ Adicionar FERIADO / EVENTO</label>
                    <select id="eventType">
                        <option value="national">🌍 Feriado Nacional</option>
                        <option value="state">🏛️ Feriado Estadual</option>
                        <option value="municipal">🏙️ Feriado Municipal</option>
                        <option value="personal">👤 Evento Pessoal</option>
                    </select>
                    <input type="text" id="eventName" placeholder="Ex: Carnaval, Férias João" autocomplete="off">
                    <input type="date" id="startDate">
                    <input type="date" id="endDate" placeholder="Opcional - mesmo dia">
                    <select id="repeatOption">
                        <option value="single">📅 Somente no ano corrente</option>
                        <option value="permanent">♾️ Permanente (todos os anos)</option>
                    </select>
                    <div id="colorPickerGroup" style="display: flex; gap: 10px; align-items: center;">
                        <input type="color" id="eventColor" value="#3b82f6">
                        <span style="font-size:0.75rem;">Cor da barra/evento</span>
                    </div>
                    <button id="addEventBtn">✓ Cadastrar</button>
                </div>
            </div>
            <div>
                <h3>📋 Feriados & Eventos Ativos</h3>
                <div id="eventsListContainer" class="badge-list"><div style="color:#888;">Nenhum evento ainda</div></div>
                <button id="clearAllBtn" class="btn-remove" style="margin-top: 12px;">🗑️ Remover TODOS</button>
            </div>
            <div class="legend">
                <span><span class="color-dot" style="background:#dc2626;"></span> Nacional</span>
                <span><span class="color-dot" style="background:#f59e0b;"></span> Estadual</span>
                <span><span class="color-dot" style="background:#10b981;"></span> Municipal</span>
                <span><span class="color-dot" style="background:#8b5cf6;"></span> Evento/Barra</span>
            </div>
            <small style="color:#2c6e9e;">* Eventos com período aparecem como BARRA.</small>
        </div>

        <div class="main-calendar">
            <div class="view-buttons">
                <button class="view-btn" data-view="month">📆 Mês</button>
                <button class="view-btn" data-view="semester">📚 Semestre</button>
                <button class="view-btn" data-view="year">🗓️ Ano</button>
                <button class="view-btn" data-view="timeline">⏱️ Linha do Tempo</button>
            </div>
            <div id="dynamicViewContainer"></div>
            <footer>Clique em qualquer dia/barra para ver detalhes. Dados salvos localmente.</footer>
        </div>
    </div>
</div>

<script>
    let events = [];
    let currentView = "month";
    let currentYear = 2026;
    let currentMonth = 5;
    let timelineYear = 2026;

    function loadData() {
        const stored = localStorage.getItem('advancedCalendarEvents');
        if(stored) { events = JSON.parse(stored); } 
        else {
            events = [
                { id: Date.now()+1, name: "Confraternização Universal", type: "national", start: "2026-01-01", end: "2026-01-01", repeatType: "permanent", color: "#dc2626" },
                { id: Date.now()+2, name: "Tiradentes", type: "national", start: "2026-04-21", end: "2026-04-21", repeatType: "permanent", color: "#dc2626" },
                { id: Date.now()+3, name: "Revolução Constitucionalista", type: "state", start: "2026-07-09", end: "2026-07-09", repeatType: "permanent", color: "#f59e0b" },
                { id: Date.now()+4, name: "Férias Servidor João (APS)", type: "personal", start: "2026-07-15", end: "2026-07-28", repeatType: "single", color: "#8b5cf6" },
                { id: Date.now()+5, name: "Aniversário Cidade", type: "municipal", start: "2026-05-20", end: "2026-05-20", repeatType: "permanent", color: "#10b981" },
                { id: Date.now()+6, name: "Férias Equipe ESF", type: "personal", start: "2026-12-10", end: "2026-12-20", repeatType: "single", color: "#f97316" }
            ];
            saveData();
        }
    }
    function saveData() { localStorage.setItem('advancedCalendarEvents', JSON.stringify(events)); }
    
    function addEvent(name, type, startDate, endDate, repeatType, color) {
        if(!name || !startDate) return false;
        const finalEnd = endDate || startDate;
        events.push({ id: Date.now(), name, type, start: startDate, end: finalEnd, repeatType, color });
        saveData();
        renderEventsList();
        renderCurrentView();
        return true;
    }
    function removeEventById(id) { events = events.filter(ev => ev.id != id); saveData(); renderEventsList(); renderCurrentView(); }
    function clearAllEvents() { if(confirm("Remover TODOS?")) { events = []; saveData(); renderEventsList(); renderCurrentView(); } }
    
    function renderEventsList() {
        const container = document.getElementById('eventsListContainer');
        if(!events.length) { container.innerHTML = '<div style="color:#888;">Nenhum evento ➕</div>'; return; }
        let html = '';
        events.forEach(ev => {
            const typeLabel = { national:'Nacional', state:'Estadual', municipal:'Municipal', personal:'Evento' }[ev.type];
            const period = ev.start === ev.end ? ev.start : `${ev.start} → ${ev.end}`;
            const repeatTxt = ev.repeatType === 'permanent' ? '♾️ perm' : '📅 ano';
            html += `<div class="badge-item"><div><span class="color-dot" style="background:${ev.color};"></span> <strong>${ev.name}</strong><br><small>${typeLabel} | ${period} | ${repeatTxt}</small></div><button class="remove-single" data-id="${ev.id}" style="background:#c2410c; padding:4px 8px; border-radius:40px;">X</button></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.remove-single').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); removeEventById(id); }));
    }

    function isEventActiveInYear(ev, year) {
        if(ev.repeatType === 'permanent') return true;
        return parseInt(ev.start.split('-')[0]) === year;
    }
    
    function getEventsForDate(year, month, day) {
        const targetDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const targetDate = new Date(year, month, day);
        return events.filter(ev => {
            if(!isEventActiveInYear(ev, year)) return false;
            const s = new Date(ev.start), e = new Date(ev.end);
            if(ev.repeatType === 'permanent') {
                let startComp = new Date(year, s.getMonth(), s.getDate());
                let endComp = new Date(year, e.getMonth(), e.getDate());
                if(ev.start === ev.end) return startComp.getMonth() === month && startComp.getDate() === day;
                return targetDate >= startComp && targetDate <= endComp;
            } else {
                if(ev.start === ev.end && ev.start === targetDateStr) return true;
                return ev.start <= targetDateStr && ev.end >= targetDateStr;
            }
        });
    }

    function showDetailModal(dateStr, eventsOfDay) {
        let modal = document.createElement('div');
        modal.className = 'modal-detail';
        let eventsHtml = eventsOfDay.length ? eventsOfDay.map(ev => `<li style="margin:8px 0; border-left:4px solid ${ev.color}; padding-left:8px;"><strong>${ev.name}</strong> (${ev.type})</li>`).join('') : '<li>Nenhum evento cadastrado</li>';
        modal.innerHTML = `<div class="modal-card"><h3>📅 ${dateStr}</h3><ul>${eventsHtml}</ul><button class="close-modal">Fechar</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }

    // ---------- VISUALIZAÇÃO MÊS ----------
    function renderMonthView(year, month) {
        const firstDay = new Date(year, month, 1);
        const startWeekday = firstDay.getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();
        let cells = [];
        for(let i=startWeekday-1; i>=0; i--) cells.push({ day: prevDays - i, current: false, date: new Date(year, month-1, prevDays - i) });
        for(let d=1; d<=daysInMonth; d++) cells.push({ day: d, current: true, date: new Date(year, month, d) });
        let remaining = 42 - cells.length;
        for(let i=1; i<=remaining; i++) cells.push({ day: i, current: false, date: new Date(year, month+1, i) });
        
        let html = `<div class="calendar-header">${['DOM','SEG','TER','QUA','QUI','SEX','SÁB'].map(d=>`<div>${d}</div>`).join('')}</div><div class="calendar-grid">`;
        for(let cell of cells) {
            const y = cell.date.getFullYear(), m = cell.date.getMonth(), d = cell.day;
            const evs = getEventsForDate(y, m, d);
            let evHtml = '';
            for(let ev of evs) {
                const isRange = ev.start !== ev.end;
                if(isRange) evHtml += `<div class="event-item bar-event" style="background:${ev.color};">📅 ${ev.name}</div>`;
                else evHtml += `<div class="event-item" style="background:${ev.color}20; border-left:3px solid ${ev.color};">${ev.name}</div>`;
            }
            const cls = cell.current ? '' : 'other-month';
            html += `<div class="calendar-day ${cls}" data-year="${y}" data-month="${m}" data-day="${d}"><div class="day-number">${d}</div><div class="event-list">${evHtml || '<span style="font-size:0.6rem;">—</span>'}</div></div>`;
        }
        html += `</div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        document.querySelectorAll('.calendar-day').forEach(el => {
            el.addEventListener('click', (e) => {
                let dayEl = e.target.closest('.calendar-day');
                let y = parseInt(dayEl.dataset.year), m = parseInt(dayEl.dataset.month), d = parseInt(dayEl.dataset.day);
                let evs = getEventsForDate(y, m, d);
                showDetailModal(`${y}-${m+1}-${d}`, evs);
            });
        });
    }

    // ----- BARRAS CONTÍNUAS PARA SEMESTRE E ANO (COM LEGENDA E TOOLTIP)-----
    function buildBarForMonth(year, month) {
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let barsHtml = `<div class="days-bar-container">`;
        for(let d=1; d<=daysInMonth; d++) {
            const evs = getEventsForDate(year, month, d);
            // construir segmentos contínuos -> agrupar eventos por cor? Vamos empilhar barras proporcionais (cada evento ocupa % da barra)
            // Melhor: mostrar barras sobrepostas? Para legibilidade, faremos cada evento como uma faixa horizontal dentro do mesmo container?
            // Vou criar barras de eventos múltiplas: se mais de um evento, mostramos segmentos proporcionais.
            let totalEvents = evs.length;
            let segments = [];
            if(totalEvents === 0) {
                barsHtml += `<div class="day-bar-row"><div class="day-number-small">${d}</div><div class="event-bar"><div class="bar-segment" style="width:100%; background:#e9ecef;"></div></div></div>`;
            } else {
                let widthPerEvent = 100 / totalEvents;
                let left = 0;
                for(let idx=0; idx<evs.length; idx++) {
                    let ev = evs[idx];
                    let tooltipText = `${ev.name} (${ev.type})`;
                    segments.push(`<div class="bar-segment tooltip-hover" style="width:${widthPerEvent}%; left:${left}%; background:${ev.color};" data-tooltip="${tooltipText.replace(/"/g, '&quot;')}"></div>`);
                    left += widthPerEvent;
                }
                barsHtml += `<div class="day-bar-row"><div class="day-number-small">${d}</div><div class="event-bar" data-year="${year}" data-month="${month}" data-day="${d}">${segments.join('')}</div></div>`;
            }
        }
        barsHtml += `</div>`;
        return barsHtml;
    }

    function renderSemesterView(year, startMonth) {
        let html = `<div class="semester-grid">`;
        let allEventColors = new Map();
        for(let i=0; i<6; i++) {
            let monthIdx = startMonth + i;
            let monthYear = year + Math.floor(monthIdx/12);
            let monthMod = monthIdx % 12;
            let monthName = new Date(monthYear, monthMod, 1).toLocaleString('pt-BR', { month: 'long' });
            html += `<div class="month-card"><div class="month-title">${monthName.toUpperCase()} / ${monthYear}</div>`;
            html += buildBarForMonth(monthYear, monthMod);
            html += `</div>`;
            // coletar cores dos eventos do mês para legenda
            for(let d=1; d<=new Date(monthYear, monthMod+1, 0).getDate(); d++) {
                getEventsForDate(monthYear, monthMod, d).forEach(ev => allEventColors.set(ev.name, {color: ev.color, type: ev.type}));
            }
        }
        html += `</div>`;
        // Legenda
        html += `<div class="legend-events">${Array.from(allEventColors.entries()).map(([name,val]) => `<div class="legend-item"><div class="legend-color" style="background:${val.color};"></div><span>${name}</span></div>`).join('')}</div>`;
        html += `<div class="month-nav" style="margin-top:20px;"><button id="prevSemBtn">◀ Semestre anterior</button><button id="nextSemBtn">Próximo semestre ▶</button></div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        attachBarClickEvents();
        document.getElementById('prevSemBtn')?.addEventListener('click', () => { currentMonth = (currentMonth-6+12)%12; currentYear = currentYear - (currentMonth>=6?0:1); renderCurrentView(); });
        document.getElementById('nextSemBtn')?.addEventListener('click', () => { currentMonth = (currentMonth+6)%12; currentYear = currentYear + (currentMonth<6?0:1); renderCurrentView(); });
    }

    function renderYearView(year) {
        let html = `<div class="year-grid">`;
        let allEventColors = new Map();
        for(let m=0; m<12; m++) {
            let monthName = new Date(year, m, 1).toLocaleString('pt-BR', { month: 'long' });
            html += `<div class="month-card"><div class="month-title">${monthName} / ${year}</div>`;
            html += buildBarForMonth(year, m);
            html += `</div>`;
            for(let d=1; d<=new Date(year, m+1, 0).getDate(); d++) {
                getEventsForDate(year, m, d).forEach(ev => allEventColors.set(ev.name, {color: ev.color, type: ev.type}));
            }
        }
        html += `</div><div class="legend-events">${Array.from(allEventColors.entries()).map(([name,val]) => `<div class="legend-item"><div class="legend-color" style="background:${val.color};"></div><span>${name}</span></div>`).join('')}</div>`;
        html += `<div class="year-selector"><button id="prevYearBtn">◀ ${year-1}</button><span style="font-weight:bold;">${year}</span><button id="nextYearBtn">${year+1} ▶</button></div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        attachBarClickEvents();
        document.getElementById('prevYearBtn')?.addEventListener('click', () => { currentYear--; renderCurrentView(); });
        document.getElementById('nextYearBtn')?.addEventListener('click', () => { currentYear++; renderCurrentView(); });
    }

    function attachBarClickEvents() {
        document.querySelectorAll('.event-bar').forEach(bar => {
            bar.addEventListener('click', (e) => {
                e.stopPropagation();
                let year = parseInt(bar.dataset.year);
                let month = parseInt(bar.dataset.month);
                let day = parseInt(bar.dataset.day);
                let evs = getEventsForDate(year, month, day);
                showDetailModal(`${year}-${month+1}-${day}`, evs);
            });
        });
    }

    // TIMELINE (igual anterior mas sem repetir legenda)
    function renderTimelineView(year) {
        let monthsWithEvents = new Set();
        events.forEach(ev => {
            if(isEventActiveInYear(ev, year)) {
                const s = new Date(ev.start), e = new Date(ev.end);
                let sM = s.getMonth(), eM = e.getMonth();
                if(ev.repeatType === 'permanent') { sM = 0; eM = 11; }
                for(let m = sM; m <= eM; m++) monthsWithEvents.add(m);
            }
        });
        let sortedMonths = Array.from(monthsWithEvents).sort((a,b)=>a-b);
        if(sortedMonths.length === 0) {
            document.getElementById('dynamicViewContainer').innerHTML = `<div style="padding:40px; text-align:center;">✨ Nenhum evento para ${year}. Adicione eventos.</div><div class="year-selector"><button id="timelinePrevYear">◀ ${year-1}</button><span>${year}</span><button id="timelineNextYear">${year+1} ▶</button></div>`;
            document.getElementById('timelinePrevYear')?.addEventListener('click', () => { timelineYear--; renderTimelineView(timelineYear); });
            document.getElementById('timelineNextYear')?.addEventListener('click', () => { timelineYear++; renderTimelineView(timelineYear); });
            return;
        }
        let today = new Date();
        let html = `<div class="timeline-container"><div class="timeline-months">`;
        for(let monthIdx of sortedMonths) {
            const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
            const monthName = new Date(year, monthIdx, 1).toLocaleString('pt-BR', { month: 'long' });
            html += `<div class="timeline-month-col" style="min-width:${daysInMonth*75}px;"><div class="timeline-month-header">${monthName.toUpperCase()} / ${year}</div><div class="timeline-days"><div class="timeline-day-row" style="display:flex;">`;
            for(let d=1; d<=daysInMonth; d++) {
                const weekday = new Date(year, monthIdx, d).getDay();
                const isWeekend = (weekday === 0 || weekday === 6);
                const isToday = (year === today.getFullYear() && monthIdx === today.getMonth() && d === today.getDate());
                let eventsDay = getEventsForDate(year, monthIdx, d);
                let eventBadges = eventsDay.map(ev => `<div class="timeline-event-badge" style="background:${ev.color};">${ev.name}</div>`).join('');
                html += `<div class="timeline-day-cell ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" data-year="${year}" data-month="${monthIdx}" data-day="${d}"><div><strong>${d}</strong></div><div class="timeline-events">${eventBadges || '-'}</div></div>`;
            }
            html += `</div></div></div>`;
        }
        html += `</div></div><div class="year-selector"><button id="timelinePrevYear">◀ ${year-1}</button><span style="font-weight:bold;">${year}</span><button id="timelineNextYear">${year+1} ▶</button></div>`;
        document.getElementById('dynamicViewContainer').innerHTML = html;
        document.querySelectorAll('.timeline-day-cell').forEach(cell => {
            cell.addEventListener('click', () => {
                let y = parseInt(cell.dataset.year), m = parseInt(cell.dataset.month), d = parseInt(cell.dataset.day);
                showDetailModal(`${y}-${m+1}-${d}`, getEventsForDate(y, m, d));
            });
        });
        document.getElementById('timelinePrevYear')?.addEventListener('click', () => { timelineYear--; renderTimelineView(timelineYear); });
        document.getElementById('timelineNextYear')?.addEventListener('click', () => { timelineYear++; renderTimelineView(timelineYear); });
    }

    function renderCurrentView() {
        if(currentView === 'month') {
            let monthLabel = new Date(currentYear, currentMonth, 1).toLocaleString('pt-BR', { month: 'long' });
            let headerHtml = `<div class="month-nav"><button id="prevMonthBtn">◀ Mês anterior</button><span class="current-month">${monthLabel} ${currentYear}</span><button id="nextMonthBtn">Próximo mês ▶</button></div><div id="monthGrid"></div>`;
            document.getElementById('dynamicViewContainer').innerHTML = headerHtml;
            renderMonthView(currentYear, currentMonth);
            document.getElementById('prevMonthBtn')?.addEventListener('click', () => { let d = new Date(currentYear, currentMonth-1,1); currentYear=d.getFullYear(); currentMonth=d.getMonth(); renderCurrentView(); });
            document.getElementById('nextMonthBtn')?.addEventListener('click', () => { let d = new Date(currentYear, currentMonth+1,1); currentYear=d.getFullYear(); currentMonth=d.getMonth(); renderCurrentView(); });
        }
        else if(currentView === 'semester') { let startSem = currentMonth - (currentMonth % 6); renderSemesterView(currentYear, startSem); }
        else if(currentView === 'year') { renderYearView(currentYear); }
        else if(currentView === 'timeline') { renderTimelineView(timelineYear); }
    }

    // Inicialização
    loadData();
    renderEventsList();
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.getAttribute('data-view');
            if(currentView === 'timeline') timelineYear = currentYear;
            renderCurrentView();
        });
    });
    document.querySelector('.view-btn[data-view="month"]').classList.add('active');
    renderCurrentView();

    document.getElementById('addEventBtn').addEventListener('click', () => {
        let name = document.getElementById('eventName').value.trim();
        let type = document.getElementById('eventType').value;
        let startDate = document.getElementById('startDate').value;
        let endDate = document.getElementById('endDate').value;
        let repeatType = document.getElementById('repeatOption').value;
        let color = document.getElementById('eventColor').value;
        if(!name || !startDate) { alert("Preencha nome e data de início"); return; }
        if(!endDate) endDate = startDate;
        if(startDate > endDate) { alert("Data final inválida"); return; }
        if(type === 'national') color = "#dc2626";
        if(type === 'state') color = "#f59e0b";
        if(type === 'municipal') color = "#10b981";
        if(type === 'personal' && (!document.getElementById('eventColor').value || document.getElementById('eventColor').value === '#3b82f6')) color = "#8b5cf6";
        addEvent(name, type, startDate, endDate, repeatType, color);
        document.getElementById('eventName').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
    });
    document.getElementById('clearAllBtn').addEventListener('click', clearAllEvents);
    const typeSelect = document.getElementById('eventType');
    const colorGroup = document.getElementById('colorPickerGroup');
    function toggleColorPicker() { colorGroup.style.display = typeSelect.value === 'personal' ? 'flex' : 'none'; }
    typeSelect.addEventListener('change', toggleColorPicker);
    toggleColorPicker();
</script>
</body>
</html>
